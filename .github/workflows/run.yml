name: "Daily News Ghost Worker"

on:
  schedule:
    - cron: '0 * * * *' # Wakes up every hour at minute 0
  workflow_dispatch: # Allows manual trigger from github.com UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the JSON back to the repository
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          pip install feedparser newspaper3k lxml_html_clean
          
      - name: Run BiasFree Scraper
        run: python scraper.py
        
      - name: Commit and Push static JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily-slider.json
          # Commit will bypass if there are no new stories scraped
          git commit -m "Automated update: new daily unbiased coverage" || echo "No changes to commit"
          git pull --rebase origin main
          git push
